<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Music Prompt Builder Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="card">

    <h1>🎵 AI Music Prompt Builder Pro</h1>

    <h3>Professional Edition by fatur62</h3>

    <p>Version 1.1</p>

    <hr>

    <h2>🎵 Genre Musik</h2>
    <div id="genreContainer"></div>

    <hr>

    <h2>😊 Mood</h2>
    <div id="moodContainer"></div>

    <hr>

    <h2>🎸 Instrument</h2>
    <div id="instrumentContainer"></div>

    <hr>

    <h2>🎨 Sound Character</h2>
    <div id="soundCharacterContainer"></div>

    <hr>

    <h2>🎤 Vocal Gender</h2>

    <div class="radio-group">

        <label>
            <input type="radio" name="gender" value="Male Vocal" checked>
            Male
        </label>

        <label>
            <input type="radio" name="gender" value="Female Vocal">
            Female
        </label>

        <label>
            <input type="radio" name="gender" value="Male & Female Duet">
            Duet
        </label>

    </div>

    <hr>

    <button id="generateBtn">
        🚀 Generate Prompt
    </button>

    <div id="hasil"></div>

    <button id="copyBtn">
        📋 Salin Prompt
    </button>

</div>

<script src="data/genre.js"></script>
<script src="data/mood.js"></script>
<script src="data/instrument.js"></script>
<script src="data/soundcharacter.js"></script>
<script src="js/script.js"></script>

</body>
</html>
